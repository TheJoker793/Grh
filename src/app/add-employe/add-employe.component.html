<h1>Add New Employee </h1>
<form #employeeForme="ngForm" (ngSubmit)="addEmploye(employeeForme.value)">
<div class="row">
    <div class="col md-4">
        <label for="cin" class="form-label">Cin:</label>
        <input type="text" class="form-control" id="cin" required>
    </div>

    <div class="col md-4">
        <label for="firstName" class="form-label">firstName:</label>
        <input type="text" class="form-control" id="firstName" required>
    </div>
    <div class="col md-4">
        <label for="lastName" class="form-label">lastName:</label>
        <input type="text" class="form-control" id="lastName" required>
    </div>
</div>
<div class="row">
    <div class="col md-4">
        <label for="dateOfBirth" class="form-label">Date of birth:</label>
        <input type="date" class="form-control" id="dateOfBirth" required>
    </div>
    <div class="col md-4">
        <label for="email" class="form-label">Email:</label>
        <input type="text" class="form-control" id="email" required>
    </div>
    <div class="col md-4">
        <label for="phone" class="form-label">phone:</label>
        <input type="text" class="form-control" id="phone" required>
    </div>
    </div>
    <div class="col md-4">
        <label for="address" class="form-label">Address:</label>
        <input type="text" class="form-control" id="address" required>
    </div>
    <select class="form-select" id="departementId"  required>
        <option selected disabled value="">Choose departement</option>
        <option *ngFor="let dep of departments" >{{dep.name}} </option>
      </select>


    <button type="submit" class="btn btn-primary">Submit</button>

</form>
